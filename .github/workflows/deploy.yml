name: Deploy API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml
    with:
      affected-base: origin/main~1
    secrets: inherit

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.validate.outputs.api-affected == 'true')

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set image tag
        id: image-tag
        run: |
          IMAGE_TAG="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/cloud-run-images/api:${{ github.sha }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'movable-madness' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy api \
            --image=${{ steps.image-tag.outputs.tag }} \
            --region=us-central1 \
            --project=${GCP_PROJECT_ID} \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=10 \
            --port=8080 \
            --quiet
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'movable-madness' }}

      - name: Allow unauthenticated access
        run: |
          gcloud run services add-iam-policy-binding api \
            --region=us-central1 \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project=${GCP_PROJECT_ID} \
            --quiet
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'movable-madness' }}

      - name: Get Cloud Run URL
        id: service-url
        run: |
          URL=$(gcloud run services describe api \
            --region=us-central1 \
            --project=${GCP_PROJECT_ID} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Service deployed to: ${URL}"
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'movable-madness' }}

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | api |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | us-central1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.image-tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.service-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
