openapi: 3.1.0
info:
  title: Nx Monorepo Template API
  description: |
    Sample API contract for the NestJS backend.
    This is a minimal example demonstrating the shared types pattern.
  version: 1.0.0
  contact:
    name: Template Maintainer

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api-{project}.run.app
    description: Cloud Run production
    variables:
      project:
        default: example
        description: GCP project ID

paths:
  /:
    get:
      summary: Hello World
      description: Returns a simple greeting message
      operationId: getHello
      tags:
        - General
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
              example:
                success: true
                data: "Hello from NestJS!"
                timestamp: "2026-01-09T12:00:00.000Z"

  /health:
    get:
      summary: Health Check
      description: Returns the health status of the API
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealthCheck'
              example:
                success: true
                data:
                  status: healthy
                  version: "1.0.0"
                  uptime: 3600
                timestamp: "2026-01-09T12:00:00.000Z"
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealthCheck'
              example:
                success: false
                error:
                  code: "SERVICE_UNHEALTHY"
                  message: "One or more services are down"
                timestamp: "2026-01-09T12:00:00.000Z"

components:
  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
          description: Indicates if the request was successful
        data:
          description: Response payload (varies by endpoint)
        error:
          $ref: '#/components/schemas/ApiError'
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of response

    ApiResponseString:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: string

    ApiResponseHealthCheck:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthCheckResponse'

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid input provided"
        details:
          type: object
          additionalProperties: true
          description: Additional context for debugging

    HealthCheckResponse:
      type: object
      required:
        - status
        - version
        - uptime
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall health status
        version:
          type: string
          description: Application version
          example: "1.0.0"
        uptime:
          type: number
          description: Uptime in seconds
          example: 3600
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceStatus'
          description: Status of dependent services

    ServiceStatus:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          description: Service name
          example: "database"
        status:
          type: string
          enum: [up, down]
          description: Service availability
        latency:
          type: number
          description: Response latency in milliseconds
          example: 15

tags:
  - name: General
    description: General endpoints
  - name: Health
    description: Health check endpoints
